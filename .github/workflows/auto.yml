name: Auto login-attendance

on:
  schedule:
    # 07:00 KST = 22:00 UTC (Previous day)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  auto-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Check Time and Day
        id: time_check
        run: |
          KST_HOUR=$(TZ=Asia/Seoul date +%H)
          KST_DAY=$(TZ=Asia/Seoul date +%u)
          echo "KST Hour: $KST_HOUR, KST Day: $KST_DAY"

      - name: Run Attendance (07:00 KST)
        run: node index.js attendance
        env:
          USER_ID: ${{ secrets.USER_ID || vars.USER_ID }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD || vars.USER_PASSWORD }}
          SITE_URL: https://green-office.uk/
