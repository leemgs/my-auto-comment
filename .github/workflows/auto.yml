name: Auto Comment and Post

on:
  schedule:
    # 08:00 KST = 23:00 UTC (Previous day)
    - cron: '0 23 * * *'
    # 09:00 KST = 00:00 UTC
    - cron: '0 0 * * *'
    # 10:00 KST = 01:00 UTC
    - cron: '0 1 * * *'
    # 15:00 KST = 06:00 UTC (Keeping for coverage if needed, but logic will filter)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  auto-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Check Time and Day
        id: time_check
        run: |
          KST_HOUR=$(TZ=Asia/Seoul date +%H)
          KST_DAY=$(TZ=Asia/Seoul date +%u)
          echo "KST Hour: $KST_HOUR, KST Day: $KST_DAY"
          echo "kst_hour=$KST_HOUR" >> $GITHUB_OUTPUT
          echo "kst_day=$KST_DAY" >> $GITHUB_OUTPUT

      - name: Run Attendance (09:00 KST)
        if: steps.time_check.outputs.kst_hour == '09' || github.event_name == 'workflow_dispatch'
        run: node index.js attendance
        env:
          USER_ID: ${{ secrets.USER_ID }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          SITE_URL: https://green-office.uk/

      - name: Run Comment Bot (Tuesdays 10:00 KST)
        if: (steps.time_check.outputs.kst_hour == '10' && steps.time_check.outputs.kst_day == '2') || github.event_name == 'workflow_dispatch'
        run: node index.js comment
        env:
          USER_ID: ${{ secrets.USER_ID }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          SITE_URL: https://green-office.uk/

      - name: Run Weekly Post (Wednesdays 08:00 KST)
        if: (steps.time_check.outputs.kst_hour == '08' && steps.time_check.outputs.kst_day == '3') || github.event_name == 'workflow_dispatch'
        run: node index.js post
        env:
          USER_ID: ${{ secrets.USER_ID }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          SITE_URL: https://green-office.uk/
